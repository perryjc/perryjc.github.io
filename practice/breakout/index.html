<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>Gamedev Canvas Workshop</title>
    <style>
    * {
        padding: 0;
        margin: 0;
    }
    canvas {
        background: #eeeeee;
        display: block;
        margin: 0 auto;
    }
      button {
        display: block;
    }

    </style>
  </head>
  <body>
    <canvas id="myCanvas" width="960" height="640"></canvas>
    <p><button id="runButton">Start game</button></p>
    
    <p>Difficulty:</p>
    <button onclick="changeSpeed('easy')">Easy Mode</button>
    <button onclick="changeSpeed('medium')">Medium Mode</button>
    <button onclick="changeSpeed('hard')">Hard Mode</button>
    <script src="breakoutScript.js"></script>
  </body>
</html>
